<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionGuide AR-SOP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SUPABASE BAĞLANTISI (DÜZELTİLDİ) ---
        const SUPABASE_URL = "https://bmulnovloaztpdffyvdu.supabase.co"; // URL'ini buraya yapıştır
        const SUPABASE_KEY = "BURAYA_ANON_KEY_YAPISTIR"; // Anon Key'ini buraya yapıştır
        
        // Buradaki yazım hatası düzeltildi
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [accessKey, setAccessKey] = useState('');
            const [library, setLibrary] = useState([]);
            const [sopForm, setSopForm] = useState({ title: '', video_url: '', image_data: null, warnings: [''], steps: [''], markers: [] });
            const fileInputRef = useRef(null);

            // Verileri Çek
            useEffect(() => { fetchSops(); }, []);

            const fetchSops = async () => {
                const { data, error } = await _supabase.from('sops').select('*').order('created_at', { ascending: false });
                if (!error) setLibrary(data);
            };

            const handleSave = async () => {
                if (!sopForm.title) return alert("Başlık girin!");
                const { error } = await _supabase.from('sops').insert([sopForm]);
                if (!error) {
                    alert("Kaydedildi!");
                    setSopForm({ title: '', video_url: '', image_data: null, warnings: [''], steps: [''], markers: [] });
                    fetchSops();
                } else { alert("Hata: " + error.message); }
            };

            if (!isAuthenticated) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen space-y-4">
                        <h1 className="text-3xl font-black italic text-blue-600">VisionGuide</h1>
                        <input 
                            type="password" 
                            placeholder="Şifre (1234)" 
                            className="p-4 border rounded-2xl text-center font-bold"
                            value={accessKey}
                            onChange={(e) => setAccessKey(e.target.value)}
                        />
                        <button 
                            onClick={() => {if(accessKey === '1234') setIsAuthenticated(true)}}
                            className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold"
                        >GİRİŞ</button>
                    </div>
                );
            }

            return (
                <div className="p-10 max-w-4xl mx-auto space-y-10">
                    <div className="bg-white p-10 rounded-[3rem] shadow-xl border">
                        <h2 className="text-2xl font-black mb-6">SOP OLUŞTUR</h2>
                        <input 
                            placeholder="SOP Başlığı" 
                            className="w-full p-4 bg-slate-50 border rounded-2xl mb-4" 
                            value={sopForm.title}
                            onChange={e => setSopForm({...sopForm, title: e.target.value})}
                        />
                        <button 
                            onClick={() => fileInputRef.current.click()}
                            className="w-full py-10 border-4 border-dashed rounded-3xl text-slate-400 font-bold mb-4"
                        >
                            {sopForm.image_data ? "Görsel Yüklendi ✓" : "Üretim Görseli Yükle"}
                        </button>
                        <input type="file" ref={fileInputRef} className="hidden" onChange={(e) => {
                            const file = e.target.files[0];
                            const reader = new FileReader();
                            reader.onloadend = () => setSopForm(p => ({...p, image_data: reader.result}));
                            reader.readAsDataURL(file);
                        }} />
                        <button 
                            onClick={handleSave}
                            className="w-full bg-blue-600 text-white py-5 rounded-3xl font-black"
                        >BULUTA KAYDET</button>
                    </div>

                    <div className="grid gap-4">
                        <h3 className="font-black text-slate-400">KAYITLI SOP'LAR ({library.length})</h3>
                        {library.map(s => (
                            <div key={s.id} className="bg-white p-6 rounded-3xl border flex justify-between items-center">
                                <span className="font-bold uppercase">{s.title}</span>
                                <span className="text-[10px] text-slate-300">ID: {s.id}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
