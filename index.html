<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionGuide AR-SOP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        // --- AYARLAR ---
        const SUPABASE_URL = "https://bmulnovloaztpdffyvdu.supabase.co"; 
        const SUPABASE_KEY = "BURAYA_ANON_KEY_YAPISTIR"; 
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { useState, useEffect, useRef } = React;
        const { Layers, Plus, Trash2, Lock, Edit, Image: ImageIcon, PlayCircle, LogOut, AlertTriangle, X } = lucide;

        const App = () => {
            const queryParams = new URLSearchParams(window.location.search);
            const viewMode = queryParams.get('view'); 
            const targetId = queryParams.get('id');

            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [accessKey, setAccessKey] = useState('');
            const [library, setLibrary] = useState([]);
            const [sopForm, setSopForm] = useState({ title: '', video_url: '', image_data: null, warnings: [''], steps: [''], markers: [] });
            const fileInputRef = useRef(null);

            useEffect(() => { fetchSops(); }, []);

            const fetchSops = async () => {
                const { data, error } = await _supabase.from('sops').select('*').order('created_at', { ascending: false });
                if (!error) setLibrary(data);
            };

            const handleSave = async () => {
                if (!sopForm.title || !sopForm.image_data) return alert("Başlık ve Görsel eksik!");
                const { error } = await _supabase.from('sops').insert([sopForm]);
                if (!error) {
                    alert("Başarıyla Kaydedildi! ✅");
                    setSopForm({ title: '', video_url: '', image_data: null, warnings: [''], steps: [''], markers: [] });
                    fetchSops();
                } else { alert("Hata: " + error.message); }
            };

            const handleDelete = async (id) => {
                if(confirm("Silinsin mi?")) {
                    const { error } = await _supabase.from('sops').delete().eq('id', id);
                    if (!error) fetchSops();
                }
            };

            // --- OPERATÖR MODU ---
            if (viewMode === 'operator' && targetId) {
                const sop = library.find(s => s.id == targetId);
                if (!sop) return <div className="p-20 text-center font-black">Yükleniyor...</div>;
                return (
                    <div className="p-6 lg:p-12 max-w-6xl mx-auto">
                        <h1 className="text-4xl font-black mb-8 border-b-4 border-blue-600 pb-4 uppercase tracking-tighter">{sop.title}</h1>
                        <div className="grid lg:grid-cols-2 gap-12">
                            <div className="relative rounded-[3rem] overflow-hidden shadow-2xl border-8 border-white">
                                <img src={sop.image_data} className="w-full h-auto" />
                                {sop.markers?.map((m, i) => (
                                    <div key={i} className="absolute -translate-x-1/2 -translate-y-1/2 w-10 h-10 rounded-full border-2 border-white bg-red-600 text-white font-black flex items-center justify-center shadow-lg" style={{ left: `${m.x}%`, top: `${m.y}%` }}>{m.label}</div>
                                ))}
                            </div>
                            <div className="space-y-4">
                                {sop.warnings?.some(w => w) && (
                                    <div className="p-6 bg-red-50 border-l-8 border-red-500 rounded-3xl mb-6">
                                        <h3 className="font-black text-red-600 mb-2 flex items-center gap-2 tracking-widest text-xs uppercase"><AlertTriangle size={16}/> Güvenlik</h3>
                                        {sop.warnings.map((w, i) => w && <p key={i} className="font-bold text-red-700 text-lg">• {w}</p>)}
                                    </div>
                                )}
                                {sop.steps?.map((s, i) => s && (
                                    <div key={i} className="flex gap-4 p-5 bg-white rounded-3xl border shadow-sm items-center">
                                        <span className="w-10 h-10 bg-blue-600 text-white rounded-xl flex items-center justify-center font-black shrink-0 shadow-md">{i+1}</span>
                                        <p className="font-bold text-slate-700 text-xl">{s}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            // --- GİRİŞ ---
            if (!isAuthenticated) {
                return (
                    <div className="max-w-md mx-auto mt-32 p-12 bg-white rounded-[4rem] shadow-2xl text-center space-y-8 border-t-8 border-blue-600">
                        <div className="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto text-blue-600"><Lock size={40} /></div>
                        <h2 className="text-4xl font-black italic">VisionGuide</h2>
                        <input type="password" placeholder="••••" className="w-full p-5 bg-slate-50 border-2 rounded-[2rem] text-center text-4xl font-black outline-none" value={accessKey} onChange={(e) => setAccessKey(e.target.value)} />
                        <button onClick={() => {if(accessKey === '1234') setIsAuthenticated(true)}} className="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl hover:bg-blue-600 transition-all">GİRİŞ YAP</button>
                    </div>
                );
            }

            // --- MÜHENDİS ANA PANEL ---
            return (
                <div className="p-6 lg:p-10 max-w-7xl mx-auto">
                    <header className="flex justify-between items-center mb-10 bg-white p-6 rounded-[2.5rem] shadow-sm border">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-xl text-white"><Layers size={24} /></div>
                            <h1 className="font-black text-xl italic uppercase tracking-tighter">VisionGuide <span className="text-blue-600">Cloud</span></h1>
                        </div>
                        <button onClick={() => setIsAuthenticated(false)} className="p-4 bg-red-50 text-red-600 rounded-2xl font-black"><LogOut size={20}/></button>
                    </header>

                    <div className="grid lg:grid-cols-12 gap-10">
                        <div className="lg:col-span-7 bg-white p-4 rounded-[3rem] border-2 border-slate-100 shadow-sm relative min-h-[500px] flex items-center justify-center">
                            {sopForm.image_data ? (
                                <div className="relative w-full overflow-hidden rounded-[2rem]" onClick={(e) => {
                                    const rect = e.currentTarget.getBoundingClientRect();
                                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                                    const label = (sopForm.markers.length + 1).toString();
                                    setSopForm(p => ({ ...p, markers: [...p.markers, {x, y, type: 'red', label}] }));
                                }}>
                                    <img src={sopForm.image_data} className="w-full h-auto block" />
                                    {sopForm.markers.map((m, i) => (
                                        <div key={i} className="absolute -translate-x-1/2 -translate-y-1/2 w-8 h-8 rounded-full border-2 border-white bg-red-600 shadow-xl flex items-center justify-center text-white font-black text-xs" style={{ left: `${m.x}%`, top: `${m.y}%` }}>{m.label}</div>
                                    ))}
                                    <button onClick={(e)=>{e.stopPropagation(); setSopForm(p=>({...p, image_data:null, markers:[]}))}} className="absolute top-4 right-4 p-3 bg-white/80 rounded-full text-red-600 shadow-lg"><X size={16}/></button>
                                </div>
                            ) : (
                                <button onClick={() => fileInputRef.current.click()} className="flex flex-col items-center gap-4 text-slate-300 hover:text-blue-500 transition-all font-black uppercase text-xs tracking-widest"><ImageIcon size={64}/>Üretim Görseli Yükle</button>
                            )}
                            <input type="file" ref={fileInputRef} className="hidden" onChange={(e) => {
                                const file = e.target.files[0];
                                if(file) {
                                    const reader = new FileReader();
                                    reader.onloadend = () => setSopForm(p => ({...p, image_data: reader.result}));
                                    reader.readAsDataURL(file);
                                }
                            }} />
                        </div>

                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-white rounded-[3rem] p-8 border-2 shadow-sm space-y-5">
                                <input placeholder="SOP Başlığı" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black text-lg outline-none" value={sopForm.title} onChange={e => setSopForm({...sopForm, title: e.target.value})} />
                                <input placeholder="Video URL" className="w-full p-3 bg-slate-50 border-2 rounded-xl text-xs font-bold outline-none" value={sopForm.video_url} onChange={e => setSopForm({...sopForm, video_url: e.target.value})} />
                                <div className="space-y-2 p-4 bg-orange-50 rounded-2xl border-2 border-orange-100">
                                    <label className="text-[10px] font-black text-orange-600 uppercase tracking-widest">Güvenlik Uyarıları</label>
                                    {sopForm.warnings.map((w, i) => (
                                        <input key={i} className="w-full p-2 bg-white border border-orange-200 rounded-xl text-xs outline-none mb-1" value={w} onChange={(e) => {
                                            const nw = [...sopForm.warnings]; nw[i] = e.target.value; setSopForm({...sopForm, warnings: nw});
                                        }} />
                                    ))}
                                    <button onClick={() => setSopForm(p => ({...p, warnings: [...p.warnings, '']}))} className="text-[9px] font-black text-orange-500 uppercase">+ Ekle</button>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Adımlar</label>
                                    {sopForm.steps.map((s, i) => (
                                        <div key={i} className="flex gap-2 mb-2">
                                            <span className="w-8 h-8 flex items-center justify-center font-black text-white bg-blue-600 rounded-lg text-xs shrink-0">{i+1}</span>
                                            <input className="flex-1 p-2 border-2 rounded-xl text-xs outline-none" value={s} onChange={(e) => {
                                                const ns = [...sopForm.steps]; ns[i] = e.target.value; setSopForm({...sopForm, steps: ns});
                                            }} />
                                        </div>
                                    ))}
                                    <button onClick={() => setSopForm(p => ({...p, steps: [...p.steps, '']}))} className="w-full py-3 border-2 border-dashed rounded-2xl text-[10px] font-black text-slate-300">+ Yeni Adım</button>
                                </div>
                                <button onClick={handleSave} className="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-black text-xl shadow-2xl active:scale-95 transition-all">BULUTA KAYDET</button>
                            </div>
                            <div className="space-y-3 pb-20">
                                {library.map(s => (
                                    <div key={s.id} className="bg-white p-4 rounded-[2.5rem] border-2 flex items-center gap-4 group hover:shadow-xl transition-all">
                                        <img src={s.image_data} className="w-12 h-12 object-cover rounded-xl border" />
                                        <div className="flex-1 min-w-0">
                                            <h4 className="font-black text-slate-800 text-xs uppercase truncate">{s.title}</h4>
                                            <p className="text-[9px] text-slate-400 font-bold uppercase">{s.steps?.length} Adım</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => window.open(`?view=operator&id=${s.id}`)} className="p-3 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition-all"><PlayCircle size={18}/></button>
                                            <button onClick={() => handleDelete(s.id)} className="p-3 bg-red-50 text-red-600 rounded-xl hover:bg-red-600 hover:text-white transition-all"><Trash2 size={18}/></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
