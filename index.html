<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionGuide AR-SOP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { Layers, Plus, Trash2, Lock, Edit, Image: ImageIcon, PlayCircle, LogOut, AlertTriangle, X } = lucide;

        // --- SADECE BU İKİSİNİ DOLDUR VE BAŞKA HİÇBİR ŞEYE DOKUNMA ---
        const SUPABASE_URL = "https://bmulnovloaztpdffyvdu.supabase.co"; 
        const SUPABASE_KEY = "BURAYA_ANON_KEY_YAPISTIR"; 
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [isAuth, setIsAuth] = useState(false);
            const [pass, setPass] = useState('');
            const [list, setList] = useState([]);
            const [form, setForm] = useState({ title: '', video_url: '', image_data: null, warnings: [''], steps: [''], markers: [] });
            const fileRef = useRef(null);

            useEffect(() => { load(); }, []);
            const load = async () => {
                const { data } = await sb.from('sops').select('*').order('created_at', { ascending: false });
                if (data) setList(data);
            };

            const save = async () => {
                if (!form.title || !form.image_data) return alert("Eksikleri doldur!");
                const { error } = await sb.from('sops').insert([form]);
                if (!error) { alert("Buluta Kaydedildi! ✅"); setForm({ title: '', video_url: '', image_data: null, warnings: [''], steps: [''], markers: [] }); load(); }
            };

            if (!isAuth) return (
                <div className="flex flex-col items-center justify-center min-h-screen space-y-6">
                    <h1 className="text-4xl font-black italic text-blue-600">VisionGuide</h1>
                    <input type="password" placeholder="Şifre (1234)" className="p-4 border-2 rounded-2xl text-center text-2xl font-black outline-none w-64" value={pass} onChange={e => setPass(e.target.value)} />
                    <button onClick={() => pass === '1234' && setIsAuth(true)} className="bg-slate-900 text-white px-12 py-4 rounded-2xl font-black shadow-xl">GİRİŞ</button>
                </div>
            );

            return (
                <div className="p-6 max-w-5xl mx-auto space-y-8">
                    <div className="bg-white p-8 rounded-[3rem] shadow-xl border space-y-4">
                        <input placeholder="SOP Başlığı" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold" value={form.title} onChange={e => setForm({...form, title: e.target.value})} />
                        <div className="border-4 border-dashed rounded-3xl p-10 text-center cursor-pointer hover:bg-slate-50" onClick={() => fileRef.current.click()}>
                            {form.image_data ? <img src={form.image_data} className="max-h-64 mx-auto rounded-xl" /> : <p className="text-slate-400 font-bold">Görsel Seç</p>}
                        </div>
                        <input type="file" ref={fileRef} className="hidden" onChange={e => {
                            const f = e.target.files[0];
                            const r = new FileReader();
                            r.onloadend = () => setForm({...form, image_data: r.result});
                            r.readAsDataURL(f);
                        }} />
                        <button onClick={save} className="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-xl shadow-lg active:scale-95 transition-all">BULUTA KAYDET</button>
                    </div>

                    <div className="space-y-4">
                        <h3 className="font-black text-slate-400 uppercase tracking-widest text-xs">Kayıtlı Protokoller ({list.length})</h3>
                        {list.map(s => (
                            <div key={s.id} className="bg-white p-4 rounded-3xl border flex items-center justify-between shadow-sm">
                                <span className="font-black text-slate-800 uppercase ml-4">{s.title}</span>
                                <button onClick={async () => { await sb.from('sops').delete().eq('id', s.id); load(); }} className="p-3 bg-red-50 text-red-600 rounded-xl"><Trash2 size={18}/></button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
