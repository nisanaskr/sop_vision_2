<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionGuide Cloud-SOP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { 
            Layers, FileText, Plus, Trash2, Lock, Edit, 
            Image: ImageIcon, Download, AlertTriangle, PlayCircle 
        } = lucide;

        // --- SUPABASE BAĞLANTISI ---
        const SUPABASE_URL = "BURAYA_PROJECT_URL_YAPISTIR";
        const SUPABASE_KEY = "BURAYA_ANON_KEY_YAPISTIR";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const queryParams = new URLSearchParams(window.location.search);
            const viewMode = queryParams.get('view'); 
            const targetId = queryParams.get('id');

            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [library, setLibrary] = useState([]);
            const [sopForm, setSopForm] = useState({ title: '', video_url: '', image_data: null, warnings: [''], steps: [''], markers: [] });
            const [accessKey, setAccessKey] = useState('');
            const fileInputRef = useRef(null);
            const downloadRef = useRef(null);

            // Verileri Supabase'den çek
            useEffect(() => {
                fetchSops();
            }, []);

            const fetchSops = async () => {
                const { data, error } = await supabase.from('sops').select('*').order('created_at', { ascending: false });
                if (!error) setLibrary(data);
            };

            const handleSave = async () => {
                if (!sopForm.title) return alert("Başlık girin!");
                const { error } = await supabase.from('sops').insert([sopForm]);
                if (!error) {
                    alert("Buluta Kaydedildi!");
                    setSopForm({ title: '', video_url: '', image_data: null, warnings: [''], steps: [''], markers: [] });
                    fetchSops();
                } else {
                    alert("Hata: " + error.message);
                }
            };

            const handleDelete = async (id) => {
                const { error } = await supabase.from('sops').delete().eq('id', id);
                if (!error) fetchSops();
            };

            // OPERATÖR GÖRÜNÜMÜ
            if (viewMode === 'operator' && targetId) {
                const sop = library.find(s => s.id == targetId);
                if (!sop) return <div className="p-20 text-center font-black">Yükleniyor veya Bulunamadı...</div>;
                return (
                    <div className="p-6 lg:p-10 max-w-6xl mx-auto">
                        <h1 className="text-3xl font-black mb-6 uppercase border-b pb-4">{sop.title}</h1>
                        {sop.warnings?.length > 0 && (
                            <div className="mb-6 p-6 bg-red-50 border-l-8 border-red-500 rounded-3xl animate-pulse">
                                <h3 className="font-black text-red-600 mb-2">⚠️ KRİTİK UYARILAR</h3>
                                {sop.warnings.map((w, i) => w && <p key={i} className="font-bold text-red-700">- {w}</p>)}
                            </div>
                        )}
                        <div className="grid lg:grid-cols-2 gap-10">
                            <div className="relative rounded-3xl overflow-hidden shadow-2xl border-4 border-white">
                                <img src={sop.image_data} className="w-full h-auto" />
                                {sop.markers?.map((m, i) => (
                                    <div key={i} className={`absolute -translate-x-1/2 -translate-y-1/2 w-10 h-10 rounded-full border-2 border-white shadow-xl flex items-center justify-center text-white font-black ${m.type === 'red' ? 'bg-red-500' : 'bg-blue-500'}`} style={{ left: `${m.x}%`, top: `${m.y}%` }}>{m.label}</div>
                                ))}
                            </div>
                            <div className="space-y-4">
                                {sop.steps?.map((s, i) => s && (
                                    <div key={i} className="flex gap-4 p-5 bg-white rounded-3xl shadow-sm border">
                                        <span className="w-10 h-10 bg-blue-600 text-white rounded-xl flex items-center justify-center font-black shrink-0">{i+1}</span>
                                        <p className="font-bold text-slate-700 text-lg">{s}</p>
                                    </div>
                                ))}
                                {sop.video_url && (
                                    <a href={sop.video_url} target="_blank" className="flex items-center justify-center gap-3 w-full py-6 bg-indigo-600 text-white rounded-[2rem] font-black text-lg shadow-xl"><PlayCircle size={28} /> VİDEO İZLE</a>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // GİRİŞ EKRANI
            if (!isAuthenticated) {
                return (
                    <div className="max-w-md mx-auto mt-32 p-10 bg-white rounded-[3rem] shadow-2xl text-center space-y-6">
                        <div className="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto text-blue-600"><Lock size={40} /></div>
                        <h2 className="text-3xl font-black italic">VisionGuide</h2>
                        <input type="password" placeholder="••••" className="w-full p-5 bg-slate-50 border rounded-2xl text-center text-2xl font-black outline-none" value={accessKey} onChange={(e) => setAccessKey(e.target.value)} />
                        <button onClick={() => {if(accessKey === '1234') setIsAuthenticated(true)}} className="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black hover:bg-blue-600 transition-all">GİRİŞ YAP</button>
                    </div>
                );
            }

            // MÜHENDİS PANELİ
            return (
                <div className="p-6 lg:p-10 max-w-7xl mx-auto">
                    <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-xl text-white"><Layers size={24} /></div>
                            <h1 className="font-black text-xl">VisionGuide <span className="text-blue-600 italic">Cloud</span></h1>
                        </div>
                        <span className="text-[10px] font-black bg-green-100 text-green-600 px-3 py-1 rounded-full uppercase">Database Connected</span>
                    </header>

                    <div className="grid lg:grid-cols-12 gap-10">
                        <div className="lg:col-span-7 space-y-4">
                            <div className="bg-white p-4 rounded-[2.5rem] border shadow-sm" ref={downloadRef}>
                                <div className="relative overflow-hidden rounded-3xl bg-slate-50 min-h-[400px] flex items-center justify-center cursor-crosshair border-2 border-dashed border-slate-200">
                                    {sopForm.image_data ? (
                                        <div className="relative" onClick={(e) => {
                                            const rect = e.currentTarget.getBoundingClientRect();
                                            const x = ((e.clientX - rect.left) / rect.width) * 100;
                                            const y = ((e.clientY - rect.top) / rect.height) * 100;
                                            const label = (sopForm.markers.length + 1).toString();
                                            setSopForm(p => ({ ...p, markers: [...p.markers, {x, y, type: 'red', label}] }));
                                        }}>
                                            <img src={sopForm.image_data} className="w-full h-auto block" />
                                            {sopForm.markers.map((m, i) => (
                                                <div key={i} className="absolute -translate-x-1/2 -translate-y-1/2 w-8 h-8 rounded-full border-2 border-white bg-red-500 shadow-xl flex items-center justify-center text-white font-black text-xs" style={{ left: `${m.x}%`, top: `${m.y}%` }}>{m.label}</div>
                                            ))}
                                        </div>
                                    ) : (
                                        <button onClick={() => fileInputRef.current.click()} className="flex flex-col items-center gap-2 text-slate-400 font-bold"><ImageIcon size={48}/>Görsel Yükle</button>
                                    )}
                                </div>
                                <input type="file" ref={fileInputRef} className="hidden" onChange={(e) => {
                                    const file = e.target.files[0];
                                    if(file) {
                                        const reader = new FileReader();
                                        reader.onloadend = () => setSopForm(p => ({...p, image_data: reader.result}));
                                        reader.readAsDataURL(file);
                                    }
                                }} />
                            </div>
                        </div>

                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-white rounded-[2.5rem] p-8 border shadow-sm space-y-4">
                                <input placeholder="SOP Başlığı" className="w-full p-4 bg-slate-50 border rounded-2xl font-black outline-none" value={sopForm.title} onChange={e => setSopForm({...sopForm, title: e.target.value})} />
                                <input placeholder="Video URL" className="w-full p-3 bg-slate-50 border rounded-xl text-xs outline-none" value={sopForm.video_url} onChange={e => setSopForm({...sopForm, video_url: e.target.value})} />
                                
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Adımlar</label>
                                    {sopForm.steps.map((s, i) => (
                                        <input key={i} className="w-full p-2 border rounded-xl text-xs outline-none mb-1" placeholder={`Adım ${i+1}`} value={s} onChange={(e) => {
                                            const ns = [...sopForm.steps]; ns[i] = e.target.value; setSopForm({...sopForm, steps: ns});
                                        }} />
                                    ))}
                                    <button onClick={() => setSopForm(p => ({...p, steps: [...p.steps, '']}))} className="text-[10px] font-black text-blue-500">+ ADIM EKLE</button>
                                </div>

                                <button onClick={handleSave} className="w-full py-5 bg-blue-600 text-white rounded-[2rem] font-black shadow-xl">BULUTA KAYDET</button>
                            </div>

                            <div className="space-y-3">
                                {library.map(s => (
                                    <div key={s.id} className="bg-white p-4 rounded-3xl border flex items-center gap-4 hover:shadow-md transition-all">
                                        <img src={s.image_data} className="w-12 h-12 object-cover rounded-xl border" />
                                        <div className="flex-1 text-xs">
                                            <h4 className="font-black uppercase truncate">{s.title}</h4>
                                            <p className="text-slate-400">ID: {s.id}</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => window.open(`?view=operator&id=${s.id}`)} className="p-2 bg-blue-50 text-blue-600 rounded-lg"><PlayCircle size={14}/></button>
                                            <button onClick={() => handleDelete(s.id)} className="p-2 bg-red-50 text-red-600 rounded-lg"><Trash2 size={14}/></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
